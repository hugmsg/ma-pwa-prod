<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-blue-600 p-4 text-white shadow-lg sticky top-0 z-10">
        <h1 class="text-xl font-bold text-center">Suivi de Production</h1>
    </nav>

    <div id="app" class="p-4 max-w-5xl mx-auto">
        <div class="flex justify-center py-10" id="loader">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>
        <div id="cards-container" class="grid gap-4 grid-cols-1 md:grid-cols-2 lg:grid-cols-3"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyzLdvtSTlJmAN_4Lss-5D5-gTdIYlCR2dA-OVS6Xy47DhFkfIcFcWDnFNPq1TbMr3-/exec?action=production";


async function fetchData() {
    const loader = document.getElementById('loader');
    const container = document.getElementById('cards-container');
    
    try {
        console.log("Tentative d'accès à :", API_URL);
        const response = await fetch(API_URL);
        
        if (!response.ok) throw new Error("Erreur réseau");
        
        const data = await response.json();
        console.log("Données reçues :", data);

        if (data.length === 0) {
            container.innerHTML = "<p class='text-center col-span-full'>Aucune donnée trouvée (Vérifiez les cases cochées en colonne R ou que la ligne 7 n'est pas vide).</p>";
        } else {
            renderCards(data);
        }
    } catch (err) {
        console.error("Erreur détaillée :", err);
        container.innerHTML = `<p class='text-red-500 text-center col-span-full'>Erreur : ${err.message}. Vérifiez la console (F12).</p>`;
    } finally {
        loader.classList.add('hidden');
    }
}

function renderCards(items) {
    const container = document.getElementById('cards-container');
    container.innerHTML = items.map(item => `
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
            <div class="flex justify-between items-start mb-3">
                <span class="font-bold text-blue-800">${item.codemodule || 'Sans nom'}</span>
                <a href="${item.lienDrive}" target="_blank" class="text-blue-500 text-sm underline">Dossier Drive</a>
            </div>
            <p class="text-sm text-gray-500 mb-3">${item.sousTitre || ''}</p>
            <div class="flex flex-wrap gap-1 mb-4">
                ${badge(item.status.enCours, 'En cours', 'yellow')}
                ${badge(item.status.aControler, 'À contrôler', 'orange')}
                ${badge(item.status.termine, 'Terminé', 'green')}
                ${badge(item.status.mail, 'Mail', 'blue')}
                ${badge(item.status.cmd, 'Cmd', 'purple')}
                ${badge(item.status.deCote, 'De côté', 'gray')}
            </div>

            <div class="text-xs text-gray-500 border-t pt-2">
                ${item.refs.filter(r => r !== "").join(' • ')}
            </div>
        </div>
    `).join('');
}
// Fonction utilitaire pour générer les badges proprement
function badge(condition, label, color) {
    if (!condition) return '';
    const colors = {
        yellow: 'bg-yellow-100 text-yellow-800',
        orange: 'bg-orange-100 text-orange-800',
        green: 'bg-green-100 text-green-800',
        blue: 'bg-blue-100 text-blue-800',
        purple: 'bg-purple-100 text-purple-800',
        gray: 'bg-gray-100 text-gray-800'
    };
    return `<span class="${colors[color]} px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">${label}</span>`;
}
fetchData();
    </script>
</body>
</html>
